<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Splitter</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <header class="text-center py-4">
            <h1 class="display-6 fw-bold">
                <i class="fas fa-receipt me-2"></i>
                Receipt Splitter
            </h1>
            <p class="text-muted">Split your bills effortlessly with AI</p>
        </header>

        <!-- Main Content -->
        <main class="row justify-content-center">
            <div class="col-12 col-lg-10">
                
                <!-- Step 1: Upload Receipt -->
                <div class="card mb-4" id="upload-section">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-upload me-2"></i>
                            Step 1: Upload Receipt
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="upload-area" id="upload-area">
                            <input type="file" id="receipt-input" accept="image/*" style="display: none;">
                            <div class="upload-content">
                                <i class="fas fa-cloud-upload-alt fa-3x mb-3"></i>
                                <h6>Tap to upload or drag & drop</h6>
                                <p class="text-muted small">Supports JPG, PNG, HEIC and other image formats</p>
                            </div>
                        </div>
                        <div class="mt-3" id="upload-status" style="display: none;">
                            <div class="d-flex align-items-center">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                <span>Processing receipt...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Review Items -->
                <div class="card mb-4" id="items-section" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-list me-2"></i>
                            Step 2: Review Items
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="receipt-info mb-3" id="receipt-info">
                            <!-- Receipt details will be populated here -->
                        </div>
                        <div class="table-responsive">
                            <table class="table table-dark table-striped">
                                <thead>
                                    <tr>
                                        <th>Item</th>
                                        <th>Price</th>
                                    </tr>
                                </thead>
                                <tbody id="items-table">
                                    <!-- Items will be populated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Add People -->
                <div class="card mb-4" id="people-section" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-users me-2"></i>
                            Step 3: Add People
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-9">
                                <input type="text" class="form-control" id="person-input" placeholder="Enter person's name">
                            </div>
                            <div class="col-3">
                                <button class="btn btn-primary w-100" id="add-person-btn">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mt-3" id="people-list">
                            <!-- People will be listed here -->
                        </div>
                    </div>
                </div>

                <!-- Step 4: Assign Items -->
                <div class="card mb-4" id="assign-section" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-user-check me-2"></i>
                            Step 4: Assign Items
                        </h5>
                    </div>
                    <div class="card-body">
                        <div id="assignment-list">
                            <!-- Assignment options will be populated here -->
                        </div>
                        <button class="btn btn-success btn-lg w-100 mt-3" id="calculate-btn">
                            <i class="fas fa-calculator me-2"></i>
                            Calculate Split
                        </button>
                    </div>
                </div>

                <!-- Step 5: Results -->
                <div class="card mb-4" id="results-section" style="display: none;">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-money-bill-wave me-2"></i>
                            Split Results
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-dark table-striped">
                                <thead>
                                    <tr>
                                        <th>Person</th>
                                        <th>Amount</th>
                                    </tr>
                                </thead>
                                <tbody id="results-table">
                                    <!-- Results will be populated here -->
                                </tbody>
                            </table>
                        </div>
                        <div class="text-center mt-3">
                            <button class="btn btn-outline-light" id="start-over-btn">
                                <i class="fas fa-redo me-2"></i>
                                Start Over
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
